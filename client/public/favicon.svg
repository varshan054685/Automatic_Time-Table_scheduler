<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338CA"/>
      <stop offset="50%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <linearGradient id="cell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Calendar top bar -->
  <rect x="64" y="80" width="384" height="96" rx="16" fill="white" opacity="0.15"/>
  <!-- Calendar pins -->
  <rect x="148" y="48" width="28" height="80" rx="14" fill="white" opacity="0.9"/>
  <rect x="336" y="48" width="28" height="80" rx="14" fill="white" opacity="0.9"/>
  <!-- Grid - Row 1 -->
  <rect x="80" y="200" width="100" height="64" rx="12" fill="white" opacity="0.92"/>
  <rect x="196" y="200" width="100" height="64" rx="12" fill="url(#cell)" opacity="0.5"/>
  <rect x="312" y="200" width="100" height="64" rx="12" fill="white" opacity="0.92"/>
  <!-- Grid - Row 2 -->
  <rect x="80" y="280" width="100" height="64" rx="12" fill="url(#cell)" opacity="0.5"/>
  <rect x="196" y="280" width="100" height="64" rx="12" fill="white" opacity="0.92"/>
  <rect x="312" y="280" width="100" height="64" rx="12" fill="url(#cell)" opacity="0.5"/>
  <!-- Grid - Row 3 -->
  <rect x="80" y="360" width="100" height="64" rx="12" fill="white" opacity="0.92"/>
  <rect x="196" y="360" width="100" height="64" rx="12" fill="url(#cell)" opacity="0.5"/>
  <rect x="312" y="360" width="100" height="64" rx="12" fill="white" opacity="0.92"/>
  <!-- Check badge -->
  <circle cx="420" cy="100" r="52" fill="#10B981"/>
  <path d="M395 100 L410 115 L445 85" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
